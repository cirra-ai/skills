name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check plugin.json and marketplace.json versions agree
        run: |
          PLUGIN_VERSION=$(jq -r .version plugins/cirra-ai-sf/.claude-plugin/plugin.json)
          MARKETPLACE_META_VERSION=$(jq -r .metadata.version .claude-plugin/marketplace.json)
          MARKETPLACE_PLUGIN_VERSION=$(jq -r '.plugins[] | select(.name=="cirra-ai-sf") | .version' .claude-plugin/marketplace.json)
          echo "plugin.json=$PLUGIN_VERSION marketplace.metadata=$MARKETPLACE_META_VERSION marketplace.plugins[cirra-ai-sf]=$MARKETPLACE_PLUGIN_VERSION"
          if [[ "$PLUGIN_VERSION" != "$MARKETPLACE_META_VERSION" || "$PLUGIN_VERSION" != "$MARKETPLACE_PLUGIN_VERSION" ]]; then
            echo "::error::Version drift between plugin.json and marketplace.json. All three must match." >&2
            exit 1
          fi

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate skill directories
        run: bash scripts/validate-skills.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install ruff
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ skills/sf-flow/tests/ skills/sf-apex/tests/ skills/sf-lwc/tests/ skills/sf-metadata/tests/ -v
