# Weekly refresh of the vendored Security Benchmark for Salesforce (SBS)
# dataset under `skills/sf-sbs-audit/references/sbs/`. If upstream has moved,
# opens a DRAFT PR against main with the regenerated artifacts.
#
# The dataset is CC BY-SA 4.0 (see references/sbs/LICENSE); this workflow
# is the only sanctioned way to mutate `controls.json` — never hand-edit.
#
# Per the shared dev policy, actions are pinned by full SHA.

name: SBS sync

on:
  schedule:
    # Mondays at 10:00 UTC. The fetch is idempotent; a PR opens only when
    # upstream actually changed.
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Regenerate SBS dataset from upstream HEAD
        run: python3 skills/sf-sbs-audit/scripts/fetch_sbs.py --latest

      - name: Open draft PR if dataset changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/sbs-sync
          base: main
          draft: true
          commit-message: 'chore(sbs): refresh vendored SBS dataset from upstream'
          title: 'chore(sbs): refresh vendored SBS dataset from upstream'
          body: |
            Auto-generated by `.github/workflows/sbs-sync.yml`.

            Re-ran `python3 skills/sf-sbs-audit/scripts/fetch_sbs.py --latest`.
            The vendored CC BY-SA 4.0 Security Benchmark for Salesforce (SBS)
            dataset in `skills/sf-sbs-audit/references/sbs/` has changed
            relative to what is on `main`. The new pin and attribution are
            recorded in `SBS_VERSION`, `controls.json#_license`, and
            `ATTRIBUTION.txt`.

            Review the diff for breaking changes (added/removed controls,
            changed risk levels, changed remediation scope). Any new controls
            land as `not_implemented` until a follow-up PR adds a row to the
            Check rubric in `SKILL.md`.

            Upstream: https://github.com/Salesforce-Security-Benchmark/docs-site
          add-paths: |
            skills/sf-sbs-audit/references/sbs/controls.json
            skills/sf-sbs-audit/references/sbs/SBS_VERSION
            skills/sf-sbs-audit/references/sbs/ATTRIBUTION.txt
          delete-branch: true
